<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <div class="card shadow">
          <div class="card-body">

            <h2 class="text-center mb-4">Calculadora</h2>

            <div class="mb-3">
              <label class="form-label">Número 1</label>
              <input type="number" id="num1" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Número 2</label>
              <input type="number" id="num2" class="form-control">
            </div>

            <div class="d-grid gap-2">

              <button class="btn btn-primary" onclick="calcular('suma')">
                Sumar
              </button>

              <button class="btn btn-danger" onclick="calcular('resta')">
                Restar
              </button>

              <button class="btn btn-success" onclick="calcular('multiplicacion')">
                Multiplicar
              </button>

              <button class="btn btn-warning" onclick="calcular('division')">
                Dividir
              </button>

            </div>

            <div class="alert alert-info mt-4 text-center">
              <strong>Resultado:</strong>
              <span id="resultado">---</span>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    async function calcular(operacion) {

      const num1 = document.getElementById('num1').value
      const num2 = document.getElementById('num2').value

      try {

        const response = await fetch('http://localhost:3000/calcular', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            num1,
            num2,
            operacion
          })
        })

        const data = await response.json()

        document.getElementById('resultado').innerText = data.resultado

      } catch (error) {
        console.error(error)
        alert('Error al conectar con el servidor')
      }
    }
  </script>

</body>
</html>
